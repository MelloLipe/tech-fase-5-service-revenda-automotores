name: CI - Quality, Security and Deploy Readiness

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: revenda_veiculos.settings
  DEBUG: "True"
  SECRET_KEY: "ci-only-secret-key"
  ALLOWED_HOSTS: "localhost,127.0.0.1,.onrender.com"

jobs:
  quality:
    name: Code Quality - Ruff and Black
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check compradores veiculos vendas revenda_veiculos manage.py

      - name: Black formatting check
        run: black --check compradores veiculos vendas revenda_veiculos manage.py

      - name: Write quality summary
        if: always()
        run: |
          {
            echo "## Code Quality"
            echo ""
            echo "| Check | Tool | Status |"
            echo "|---|---|---|"
            echo "| Lint | Ruff | ${{ job.status }} |"
            echo "| Formatting | Black | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  tests:
    name: Application Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Django migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          coverage run --source=compradores,veiculos,vendas,revenda_veiculos manage.py test
          coverage report --fail-under=70 | tee coverage-summary.txt
          coverage xml

      - name: Write tests summary
        if: always()
        run: |
          {
            echo "## Application Tests and Coverage"
            echo ""
            echo "- Test command: \`coverage run ... manage.py test\`"
            echo "- Coverage gate: \`70%\`"
            echo ""
            echo "\`\`\`text"
            if [ -f coverage-summary.txt ]; then
              cat coverage-summary.txt
            else
              echo "Coverage summary not generated."
            fi
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install SAST tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Bandit SAST scan
        run: |
          bandit -r compradores veiculos vendas revenda_veiculos \
            -c pyproject.toml \
            -f json \
            -o bandit-report.json

      - name: Write SAST summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = Path("bandit-report.json")
          print("## SAST - Bandit")
          print("")
          if not report.exists():
              print("Bandit report was not generated.")
              raise SystemExit(0)

          data = json.loads(report.read_text())
          metrics = data.get("metrics", {}).get("_totals", {})
          results = data.get("results", [])
          print("| Metric | Value |")
          print("|---|---:|")
          print(f"| Issues found | {len(results)} |")
          print(f"| High severity | {metrics.get('SEVERITY.HIGH', 0)} |")
          print(f"| Medium severity | {metrics.get('SEVERITY.MEDIUM', 0)} |")
          print(f"| Low severity | {metrics.get('SEVERITY.LOW', 0)} |")
          print("")
          print("Artifact: `bandit-sast-report`")
          PY

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-sast-report
          path: bandit-report.json

  sca:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Generate CycloneDX SBOM
        run: pip-audit -r requirements.txt --format=cyclonedx-json --output=sbom.cdx.json

      - name: Run dependency vulnerability scan
        run: pip-audit -r requirements.txt --format=json --output=pip-audit-report.json

      - name: Write SCA and SBOM summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          print("## SCA and SBOM")
          print("")

          audit_path = Path("pip-audit-report.json")
          if audit_path.exists():
              audit = json.loads(audit_path.read_text())
              deps = audit.get("dependencies", [])
              vulns = sum(len(dep.get("vulns", [])) for dep in deps)
              print("| Metric | Value |")
              print("|---|---:|")
              print(f"| Dependencies audited | {len(deps)} |")
              print(f"| Vulnerabilities found | {vulns} |")
          else:
              print("pip-audit report was not generated.")

          sbom_path = Path("sbom.cdx.json")
          if sbom_path.exists():
              sbom = json.loads(sbom_path.read_text())
              components = sbom.get("components", [])
              print(f"| SBOM components | {len(components)} |")
              print("")
              print("Artifacts: `pip-audit-sca-report`, `sbom-cyclonedx-json`")
          else:
              print("")
              print("SBOM was not generated.")
          PY

      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-sca-report
          path: pip-audit-report.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx-json
          path: sbom.cdx.json

  deploy-readiness:
    name: Deploy Readiness - Django and Render Simulation
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
      - sast
      - sca

    env:
      DEBUG: "False"
      SECRET_KEY: "ci-deploy-readiness-secret-key-5f0f8b8d5f8a4a9d9b8e7c6d5a4b3c2f"
      ALLOWED_HOSTS: ".onrender.com,localhost,127.0.0.1"
      SECURE_SSL_REDIRECT: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django deployment checks
        run: python manage.py check --deploy

      - name: Check pending migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Simulate Render build step
        run: python manage.py collectstatic --noinput

      - name: Simulate database migration step
        run: python manage.py migrate --noinput

      - name: Write deploy readiness summary
        if: always()
        run: |
          {
            echo "## Deploy Readiness"
            echo ""
            echo "| Check | Command |"
            echo "|---|---|"
            echo "| Django production checks | \`python manage.py check --deploy\` |"
            echo "| Pending migrations | \`python manage.py makemigrations --check --dry-run\` |"
            echo "| Static files | \`python manage.py collectstatic --noinput\` |"
            echo "| Database migration | \`python manage.py migrate --noinput\` |"
            echo ""
            echo "Deploy gate status: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - quality
      - tests
      - sast
      - sca
      - deploy-readiness

    steps:
      - name: Write consolidated summary
        run: |
          {
            echo "# AutoRevenda CI/CD Summary"
            echo ""
            echo "| Stage | Result |"
            echo "|---|---|"
            echo "| Code Quality | ${{ needs.quality.result }} |"
            echo "| Tests and Coverage | ${{ needs.tests.result }} |"
            echo "| SAST - Bandit | ${{ needs.sast.result }} |"
            echo "| SCA + SBOM | ${{ needs.sca.result }} |"
            echo "| Deploy Readiness | ${{ needs.deploy-readiness.result }} |"
            echo ""
            echo "## Evidence artifacts"
            echo ""
            echo "- \`coverage-xml\`"
            echo "- \`bandit-sast-report\`"
            echo "- \`pip-audit-sca-report\`"
            echo "- \`sbom-cyclonedx-json\`"
          } >> "$GITHUB_STEP_SUMMARY"
