<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Revenda de Veículos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar .nav-link { color: #ccc; padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #16213e; }
        .sidebar .nav-link i { margin-right: 10px; }
        .stat-card { border-left: 4px solid; border-radius: 8px; }
        .stat-card.blue { border-left-color: #0d6efd; }
        .stat-card.green { border-left-color: #198754; }
        .stat-card.orange { border-left-color: #fd7e14; }
        .stat-card.red { border-left-color: #dc3545; }
        .badge-disponivel { background: #198754; }
        .badge-reservado { background: #fd7e14; }
        .badge-vendido { background: #dc3545; }
        .badge-selecionado { background: #0dcaf0; color: #000; }
        .badge-pagamento_pendente { background: #ffc107; color: #000; }
        .badge-pago { background: #0d6efd; }
        .badge-concluido { background: #198754; }
        .badge-cancelado { background: #6c757d; }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #dee2e6; }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-item::before { content: ''; position: absolute; left: -24px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: #0d6efd; border: 2px solid #fff; }
    </style>
</head>
<body class="bg-light">
    <div class="d-flex">
        <nav class="sidebar d-flex flex-column p-0" style="width: 250px;">
            <div class="p-3 text-white text-center border-bottom border-secondary">
                <h5 class="mb-0"><i class="bi bi-car-front-fill"></i> AutoRevenda</h5>
                <small class="text-muted">Sistema de Gestao</small>
            </div>
            <ul class="nav flex-column mt-2">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'dashboard' %}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/veiculos' in request.path %}active{% endif %}" href="{% url 'veiculos_list' %}">
                        <i class="bi bi-car-front"></i> Veiculos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/compradores' in request.path %}active{% endif %}" href="{% url 'compradores_list' %}">
                        <i class="bi bi-people"></i> Compradores
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/vendas' in request.path %}active{% endif %}" href="{% url 'vendas_list' %}">
                        <i class="bi bi-cart-check"></i> Vendas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/devsecops' in request.path %}active{% endif %}" href="{% url 'devsecops_dashboard' %}">
                        <i class="bi bi-shield-check"></i> DevSecOps
                    </a>
                </li>
                <li class="nav-item mt-3 border-top border-secondary pt-2">
                    <a class="nav-link" href="/api/veiculos/" target="_blank">
                        <i class="bi bi-code-slash"></i> API REST
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/" target="_blank">
                        <i class="bi bi-gear"></i> Admin
                    </a>
                </li>
            </ul>
        </nav>

        <main class="flex-grow-1 p-4">
            {% if messages %}
            {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
